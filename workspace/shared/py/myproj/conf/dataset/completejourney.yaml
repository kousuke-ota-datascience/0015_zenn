default: 
    file: 
        path: "{path_sys_base}/shared/data/10_interim/completejourney"
        name: ""
        type: "parquet" ## csv(include tsv, ssv) or yaml or pickle
    read_option: 
        csv: 
            delimiter: ","
            header: 0
            dtype: "object"
            quotechar: "\""
            quoting: 1 ## quoting = QUOTE_MINIMAL (0), QUOTE_ALL (1), QUOTE_NONNUMERIC (2) or QUOTE_NONE (3).
            encoding: "utf-8"
        yaml: 
            encoding: "utf-8"

