services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/workspace/data:ro

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    depends_on:
      - api
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8050:8050"
