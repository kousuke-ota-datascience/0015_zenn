mode: edge_weight

data:
  dataset_yaml: shared/py/myproj/conf/dataset/completejourney/10_interim.yaml
  campaign_id: "18"
  pre_weeks: 8
  collinearity_threshold: 0.995
  discovery_dir: articles/a07f0cdc427e09/artifacts/causal_discovery
  output_dir: articles/a07f0cdc427e09/artifacts/causal_inference

feature_config_path: articles/a07f0cdc427e09/conf/causal_inference/completejourney_household.yaml

edge_weight:
  algorithms:
    - pc
    - ges
    - lingam
    - notears
  robust_se: none
  min_samples: 30

treatment_effect:
  treatment: treated
  outcome: outcome_sales_value
  estimand: ATE
  adjustment_strategy: pre_treatment_covariates
  covariates: null
  effect_methods:
    - diff_in_means
    - ols
    - ipw
  robust_se: HC3
  propensity_clip:
    lower: 0.01
    upper: 0.99
  cross_fitting_folds: 0

report:
  language: ja
  write_markdown: true
  write_csv: true
  write_config_snapshot: true
